<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Verified</title>
<style>
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --accent: #101172;
    --accent-hover: #0e0e5e;
    --accent-light: #eef2ff;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
html, body {
    min-height: 100vh;
}
body {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    padding: 20px;
    overflow: hidden;
}

/* soft glow background – using brand colour */
body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: rgba(16, 17, 114, 0.05);
    filter: blur(120px);
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 0;
    pointer-events: none;
}
body::after {
    content: "";
    position: absolute;
    width: 280px;
    height: 280px;
    background: rgba(16, 17, 114, 0.04);
    filter: blur(90px);
    bottom: 5%;
    right: 12%;
    z-index: 0;
    pointer-events: none;
}

.verification-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 50px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.04);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to   { opacity: 1; transform: translateY(0); }
}

.success-icon {
    width: 90px;
    height: 90px;
    margin: 0 auto 25px;
    border-radius: 50%;
    background: var(--accent-light);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 25px rgba(16, 17, 114, 0.15);
    animation: pop 0.5s ease;
    position: relative;
}

/* pulsing ring */
.success-icon::before {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(16, 17, 114, 0.25);
    animation: ring 2.2s ease-out infinite;
}

@keyframes ring {
    0%   { transform: scale(0.85); opacity: 0.8; }
    100% { transform: scale(1.25); opacity: 0; }
}

@keyframes pop {
    0%   { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* checkmark – uses brand colour */
.success-icon svg {
    width: 42px;
    height: 42px;
    overflow: visible;
}
.success-icon svg path {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 30;
    stroke-dashoffset: 30;
    animation: draw 0.5s ease 0.35s forwards;
}
@keyframes draw {
    to { stroke-dashoffset: 0; }
}

h1 {
    font-size: 34px;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
    color: var(--text);
}
p {
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 30px;
    font-size: 15px;
}

.btn-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.login-btn {
    display: inline-block;
    padding: 14px 34px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    border-radius: 14px;
    font-weight: 600;
    transition: all 0.25s ease;
    box-shadow: 0 10px 25px rgba(16, 17, 114, 0.25);
}
.login-btn:hover {
    background: var(--accent-hover);
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(16, 17, 114, 0.35);
}
.login-btn:active {
    transform: translateY(0);
}

.secondary-btn {
    display: inline-block;
    padding: 14px 34px;
    background: transparent;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 14px;
    font-weight: 500;
    font-size: 14px;
    transition: all 0.25s ease;
}
.secondary-btn:hover {
    color: var(--text);
    border-color: var(--accent);
    background: var(--accent-light);
}

.small-text {
    margin-top: 22px;
    font-size: 13px;
    color: var(--muted);
    opacity: 0.8;
}

/* mobile */
@media (max-width: 480px) {
    .verification-card {
        padding: 35px 25px;
    }
    h1 {
        font-size: 28px;
    }
}
</style>
</head>
<body>
<div class="verification-card">
    <div class="success-icon">
        <svg viewBox="0 0 24 24">
            <path d="M4 12.5l5 5L20 6.5"/>
        </svg>
    </div>
    <h1>Email Verified</h1>
    <p>
        Your email has been successfully verified.<br>
        Your account is now active and ready to use.
    </p>
    <div class="btn-row">
        <a href="{% url 'login' %}" class="login-btn">
            Login to Your Account
        </a>
        <a href="{% url 'index' %}" class="secondary-btn">
            Back to Home
        </a>
    </div>
    <div class="small-text">
        Welcome to your marketplace experience
    </div>
</div>
</body>
</html>
